<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Ultra Penworks</title>
    <link href="assets/css/style.css" rel="stylesheet">
    <script src="assets/build/common.js"></script>
</head>
<body>
    <header>
        <div class="logo">
            <img class="fullwidth block" src="assets/images/header.jpg">
            <img class="fullwidth block" src="assets/images/scaledheader.png">
        </div>
    </header>
    <section class="main-content">
        <div class="come-in carousel-Slider">
            <div>
                <img src="assets/images/slide1.jpg">
            </div>
            <div>
                <img src="assets/images/slide2.jpg">
            </div>
            <div>
                <img src="assets/images/slide3.jpg">
            </div>
            <div>
                <img src="assets/images/slide4.jpg">
            </div>
        </div>
        <div class="bestsellers fullwidth">
            <img class="come-in fullwidth block" src="assets/images/bestsellers.jpg">
            <div class="products fullwidth flexed spaced">
                <img class="p_anim block" src="assets/images/bs1.jpg">
                <img class="p_anim block" src="assets/images/bs2.jpg">
                <img class="p_anim block" src="assets/images/bs3.jpg">
                <img class="p_anim block" src="assets/images/bs4.jpg">
            </div>
        </div>
        <div class="carousel2 fullwidth">
            <img class="p_anim fullwidth block" src="assets/images/carousel2.jpg">
        </div>
        <div class="newdeals fullwidth">
            <img class="p_anim fullwidth block" src="assets/images/newdeals.jpg">
            <div class="products fullwidth flexed spaced">
                <img class="p_anim block" src="assets/images/nd1.jpg">
                <img class="p_anim block" src="assets/images/nd2.jpg">
                <img class="p_anim block" src="assets/images/nd3.jpg">
                <img class="p_anim block" src="assets/images/nd4.jpg">
            </div>
        </div>
        <div class="createcatalog fullwidth">
            <img class="p_anim fullwidth block" src="assets/images/createcatalog.jpg">
        </div>
        <div class="startingat fullwidth">
            <img class="p_anim fullwidth block" src="assets/images/startingat.jpg">
        </div>
        <div class="whychoose fullwidth">
            <img class="p_anim fullwidth block" src="assets/images/whychoose.jpg">
            <div class="chooseus fullwidth flexed spaced">
                <img class="p_anim block" src="assets/images/choose1.jpg">
                <img class="p_anim block" src="assets/images/choose2.jpg">
                <img class="p_anim block" src="assets/images/choose3.jpg">
                <img class="p_anim block" src="assets/images/choose4.jpg">
            </div>
        </div>
        <div class="clients fullwidth flexed centered">
            <div class="p_anim clientsays block">
                <div>
                    <img src="assets/images/clientleft.jpg">
                </div>
                <div>
                    <img src="assets/images/clientleft.jpg">
                </div>
                <div>
                    <img src="assets/images/clientleft.jpg">
                </div>
            </div>
            <img class="p_anim clientright block" src="assets/images/clientright.jpg"></img>
        </div>
        <div class="final fullwidth block flexed spaced">
            <img class="p_anim block" src="assets/images/last1.jpg">
            <img class="p_anim block" src="assets/images/last2.jpg">
            <img class="p_anim block" src="assets/images/last3.jpg">
        </div>
    </section>
    <footer>
            <img class="p_anim fullwidth block" src="assets/images/footer.jpg">
    </footer>
</body>
</html>
